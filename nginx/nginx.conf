# ── Main Nginx reverse proxy ─────────────────────────────────────

upstream backend {
    server backend:5000;
    keepalive 32;
}

upstream frontend {
    server frontend:80;
    keepalive 16;
}

# Rate limiting zones
limit_req_zone  $binary_remote_addr zone=api:10m  rate=30r/m;
limit_req_zone  $binary_remote_addr zone=auth:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=conn:10m;

# ── HTTP server ───────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # ── Security headers ──────────────────────────────────────────
    add_header X-Frame-Options           "DENY"                                    always;
    add_header X-Content-Type-Options    "nosniff"                                 always;
    add_header X-XSS-Protection          "1; mode=block"                           always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"         always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"
        always;

    # Remove server fingerprint
    server_tokens off;
    more_clear_headers Server;

    # Gzip
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1024;

    # Request limits
    client_max_body_size    2M;
    client_body_timeout     10s;
    client_header_timeout   10s;
    keepalive_timeout       30s;
    send_timeout            10s;

    # Connection limit per IP
    limit_conn conn 20;

    # ── Auth endpoints — strict rate limit ────────────────────────
    location ~ ^/api/auth/(login|register) {
        limit_req  zone=auth burst=3 nodelay;
        limit_conn conn 5;

        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 30s;
    }

    # ── All other API routes ──────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }

    # ── Swagger UI ────────────────────────────────────────────────
    location ~ ^/(apidocs|apispec_1\.json|flasgger_static) {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host      $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # ── Health check ──────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── Block common attack paths ─────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }
    location ~ \.(env|git|sql|bak|log|sh)$ {
        deny all;
        return 404;
    }

    # ── Frontend SPA ──────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
    }
}
