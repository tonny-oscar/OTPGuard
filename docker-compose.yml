version: "3.9"

networks:
  otpguard_net:
    driver: bridge

volumes:
  postgres_data:
  backend_logs:

services:

  # ── PostgreSQL ───────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: otpguard_postgres
    restart: unless-stopped
    networks:
      - otpguard_net
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-otpguard}
      POSTGRES_USER:     ${POSTGRES_USER:-otpguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-otpguard_secret}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-otpguard} -d ${POSTGRES_DB:-otpguard}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Flask Backend ────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: otpguard_backend
    restart: unless-stopped
    networks:
      - otpguard_net
    volumes:
      - backend_logs:/app/logs
    # Load env file based on APP_ENV (default: dev)
    env_file:
      - .env.${APP_ENV:-dev}
    environment:
      # Always point to postgres container when running in Docker
      DATABASE_URL: "postgresql://${POSTGRES_USER:-otpguard}:${POSTGRES_PASSWORD:-otpguard_secret}@postgres:5432/${POSTGRES_DB:-otpguard}"
      FLASK_ENV:    ${APP_ENV:-development}
      PORT:         "5000"
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── React Frontend ───────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: otpguard_frontend
    restart: unless-stopped
    networks:
      - otpguard_net
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Nginx Reverse Proxy ──────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: otpguard_nginx
    restart: unless-stopped
    networks:
      - otpguard_net
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
